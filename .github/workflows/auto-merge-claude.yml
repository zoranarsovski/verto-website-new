name: Auto-merge Claude PRs

# Enables GitHub auto-merge on PRs from `claude/*` branches.
# The actual merge waits for required status checks (e.g. the Cloudflare
# Pages preview deployment) to succeed — configure those via branch
# protection on `main`.
#
# Prerequisites (one-time):
#   1. Repo Settings → General → check "Allow auto-merge"
#   2. Repo Settings → Branches → add a protection rule on `main` that
#      requires the Cloudflare Pages preview check to pass.
#
# Escape hatches:
#   - Open the PR as a draft → this workflow skips it.
#   - Open from a non-`claude/*` branch → this workflow skips it.
#   - Disable or delete this file → auto-merge stops happening.

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: startsWith(github.head_ref, 'claude/') && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge (squash + delete branch)
        run: gh pr merge "$PR_NUMBER" --auto --squash --delete-branch
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
